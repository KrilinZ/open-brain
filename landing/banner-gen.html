<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background-color: #090314;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      color: white;
      text-align: center;
    }
    .logo-container {
      width: 250px;
      height: 250px;
      margin-bottom: 20px;
      position: relative;
    }
    .logo-container::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%; width: 140%; height: 140%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(224,64,251,0.25) 0%, transparent 60%);
      z-index: 1;
    }
    .logo {
      width: 100%;
      height: 100%;
      object-fit: contain;
      position: relative;
      z-index: 2;
    }
    h1 {
      font-family: 'Orbitron', monospace;
      font-size: 72px;
      letter-spacing: 2px;
      margin-bottom: 10px;
      font-weight: 700;
      color: #fff;
    }
    p {
      font-size: 32px;
      font-weight: 600;
      color: #b388ff;
      opacity: 0.9;
    }
    p strong {
      color: #00e5ff;
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <img src="file:///Users/nacho/Desktop/programapp/landing/logo.png" class="logo" />
  </div>
  <h1>Open Brain OS</h1>
  <p>The <strong>Neural OS</strong> for AI-First Development</p>
</body>
</html>
